<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AFAQ Digital builds premium websites, online stores, dashboards, and smart digital solutions for growing businesses."
    />
    <meta name="theme-color" content="#05070d" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" />
    <link rel="icon" type="image/png" href="/afaq-digital-icon.png" />
    <script>
      // Apply the saved theme before first paint to avoid a light/dark flash.
      try {
        var afaqTheme = localStorage.getItem("afaq-theme");
        document.documentElement.dataset.theme = afaqTheme === "light" ? "light" : "dark";
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
    <title>AFAQ Digital | Premium Websites & Smart Systems</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
